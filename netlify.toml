# mitziwyman.com homepage → main site
[[redirects]]
  from = "https://mitziwyman.com/"
  to = "/main-home.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

[[redirects]]
  from = "/api/assess"
  to = "/.netlify/functions/assess"
  status = 200

[[redirects]]
  from = "/api/diagnostic"
  to = "/.netlify/functions/diagnostic"
  status = 200

[[redirects]]
  from = "/api/send-reflection"
  to = "/.netlify/functions/send-reflection"
  status = 200

[[redirects]]
  from = "/api/my-now"
  to = "/.netlify/functions/my-now-data"
  status = 200

[[redirects]]
  from = "/you"
  to = "/you.html"
  status = 200

# mitziwyman.com all other paths → pass through unchanged
[[redirects]]
  from = "https://mitziwyman.com/*"
  to = "/:splat"
  status = 200
  force = true
